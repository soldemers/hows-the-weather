<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How's the Weather?</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Dynamic Weather Background -->
    <div id="weatherBg" class="weather-bg">
        <div id="weatherParticles" class="weather-particles"></div>
        <div id="sunEffect" class="sun-effect" style="display:none;"></div>
        <div id="moonEffect" class="moon-effect" style="display:none;">
            <div class="moon-body">
                <div class="moon-shadow"></div>
            </div>
            <div class="moon-glow"></div>
            <div class="stars" id="starsLayer"></div>
        </div>
        <div id="cloudLayer" class="cloud-layer" style="display:none;">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="cloud cloud-4"></div>
            <div class="cloud cloud-5"></div>
        </div>
    </div>
    <div class="app">

        <!-- Search Section -->
        <div class="search-section">
            <h1 class="app-title">How's the Weather?</h1>
            <div class="search-wrapper">
                <div class="search-bar" id="searchBar">
                    <i class="fas fa-magnifying-glass search-icon"></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search for a city..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="clearBtn" class="clear-btn" aria-label="Clear search">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <ul id="suggestions" class="suggestions-list" role="listbox"></ul>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p class="loading-text">Fetching weather…</p>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg" style="display:none;">
            <i class="fas fa-triangle-exclamation"></i>
            <span id="errorText">City not found. Please try again.</span>
        </div>

        <!-- Weather Display Section -->
        <div id="weatherSection" class="weather-section" style="display:none;">

            <!-- Current Weather Card -->
            <div class="current-weather-card glass">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="currentDate"></p>
                </div>
                <div class="main-weather">
                    <img id="weatherIcon" src="" alt="weather icon" class="weather-icon-img">
                    <div class="temp-block">
                        <div class="temp-display">
                            <span id="temperature" class="temp"></span>
                            <span class="temp-unit">°F</span>
                        </div>
                        <p id="description" class="description"></p>
                        <p id="feelsLike" class="feels-like"></p>
                    </div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card glass">
                    <div class="stat-icon-wrap blue">
                        <i class="fas fa-droplet"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Humidity</span>
                        <span id="humidity" class="stat-value">—</span>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon-wrap yellow" id="uvIconWrap">
                        <i class="fas fa-sun"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">UV Index</span>
                        <span id="uvIndex" class="stat-value">—</span>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon-wrap blue">
                        <i class="fas fa-cloud-rain"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Precipitation</span>
                        <span id="precipitation" class="stat-value">—</span>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon-wrap purple">
                        <i class="fas fa-wind"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Wind Speed</span>
                        <span id="wind" class="stat-value">—</span>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon-wrap orange">
                        <i class="fas fa-eye"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Visibility</span>
                        <span id="visibility" class="stat-value">—</span>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon-wrap teal">
                        <i class="fas fa-gauge-high"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-label">Pressure</span>
                        <span id="pressure" class="stat-value">—</span>
                    </div>
                </div>
            </div>

            <!-- 24-Hour Forecast -->
            <div class="forecast-section glass">
                <div class="forecast-header">
                    <i class="fas fa-clock"></i>
                    <h3 class="forecast-title">24-Hour Forecast</h3>
                </div>
                <div id="forecastScroll" class="forecast-scroll"></div>
            </div>

        </div>
    </div>

    <script src="weather.js"></script>
</body>
</html>
